# Server Configuration
server.port=8080
spring.application.name=smartcommerce-api
spring.profiles.active=dev

# GraphQL Configuration
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.path=/graphql

# Logging Configuration
logging.level.com.smartcommerce=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.graphql=DEBUG

# AOP Aspect Logging Levels
logging.level.com.smartcommerce.aspect=INFO
logging.level.com.smartcommerce.aspect.LoggingAspect=DEBUG
logging.level.com.smartcommerce.aspect.PerformanceMonitoringAspect=INFO
logging.level.com.smartcommerce.aspect.ExceptionLoggingAspect=WARN

# Service Layer Logging
logging.level.com.smartcommerce.service=INFO

# DAO Layer Logging
logging.level.com.smartcommerce.dao=INFO

# Hibernate / JDBC Logging Suppression
logging.level.org.hibernate=warn
logging.level.org.hibernate.tool.hbm2ddl=warn
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn
logging.level.org.springframework.jdbc=warn
logging.level.org.springframework.orm.jpa=warn
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
logging.level.org.hibernate.stat=DEBUG
management.endpoints.web.exposure.include=*

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always

