spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_test
    username: test_user
    password: test_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 3

  jpa:
    hibernate:
      ddl-auto: create-drop  # Recreate schema for each test run
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

logging:
  level:
    com.smartcommerce: INFO
    org.hibernate.SQL: DEBUG
